<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relocation Service | Inconnek</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:white;
    color:#333;
}

/* NAV */
nav{
    background:#203a43;
    padding:15px 60px;
}

nav a{
    color:#1e88e5;
    text-decoration:none;
    font-weight:600;
}

/* HERO (same vibe as main site) */
.hero{
    padding:120px 60px 60px;
    background:linear-gradient(135deg,#1e88e5,#00c853);
    color:white;
}

.hero h1{
    font-size:48px;
    font-weight:700;
}

.hero p{
    margin-top:15px;
    max-width:600px;
}

/* PRICE BOX */
.price-box{
    margin-top:30px;
    background:white;
    color:#333;
    padding:20px 30px;
    border-radius:15px;
    display:inline-block;
    font-weight:600;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* SECTION */
.section{
    padding:80px 60px;
}

/* CHATBOX */
.chat-container{
    max-width:600px;
    margin:auto;
    background:#f4f6f9;
    border-radius:20px;
    padding:30px;
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

.chat-header{
    font-weight:600;
    margin-bottom:20px;
    color:#1e88e5;
}


/* CHAT CONTAINER */
.chat-container{
    max-width:650px;
    margin:auto;
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 25px 60px rgba(0,0,0,0.12);
    border:1px solid rgba(0,0,0,0.05);
}

/* HEADER */
.chat-header{
    font-size:20px;
    font-weight:600;
    color:#1e88e5;
    margin-bottom:25px;
}

.chat-header span{
    display:block;
    font-size:14px;
    font-weight:400;
    color:#666;
    margin-top:5px;
}

/* GROUP */
.chat-group{
    margin-bottom:20px;
}

/* LABEL */
.chat-group label{
    display:block;
    font-size:13px;
    color:#555;
    margin-bottom:8px;
}

/* INPUT */
.chat-group input{
    width:100%;
    padding:16px 18px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:15px;
    transition:0.25s ease;
    background:#f9fafb;
}

/* FOCUS EFFECT */
.chat-group input:focus{
    outline:none;
    border-color:#1e88e5;
    background:white;
    box-shadow:0 0 0 3px rgba(30,136,229,0.15);
}

/* BUTTON */
.btn{
    margin-top:10px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:50px;
    background:linear-gradient(to right,#1e88e5,#00c853);
    color:white;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.04);
}

body{
    opacity:0;
    transform:translateY(20px);
    transition: all 0.5s ease;
}

body.fade-in{
    opacity:1;
    transform:translateY(0);
}

body.fade-out{
    opacity:0;
    transform:translateY(-20px);
}

@media (max-width: 768px){

    /* NAV */
    nav{
        padding:15px 20px;
    }

    /* HERO */
    .hero{
        padding:100px 20px 40px;
        text-align:center;
    }

    .hero h1{
        font-size:32px;
    }

    .hero p{
        font-size:14px;
    }

    /* PRICE BOX */
    .price-box{
        display:block;
        margin:20px auto 0;
        text-align:center;
    }

    /* SECTION */
    .section{
        padding:50px 20px;
    }

    /* CHAT */
    .chat-container{
        padding:25px 20px;
    }

    .chat-group input{
        padding:14px;
        font-size:14px;
    }

    .btn{
        padding:14px;
        font-size:14px;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="Inconnek.html">⬅ Back to Home</a>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Relocation Service</h1>
    <p>
        Moving to a new place? We’ll transfer your internet connection
        quickly and smoothly with minimal downtime.
    </p>

    <div class="price-box">
        Relocation Fee: ₱1,000
    </div>
</div>

<div class="chat-container">

    <div class="chat-header">
        Request Relocation
        <span>Fill in the details below and we’ll assist you.</span>
    </div>

    <form id="relocation_form" onsubmit="return false;">
	

        <div class="chat-group">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="Enter your full name" required>
        </div>

        <div class="chat-group">
            <label>Old Address</label>
            <input type="text" name="old_address" placeholder="Where are you moving from?" required>
        </div>

        <div class="chat-group">
            <label>New Address</label>
            <input type="text" name="new_address" placeholder="Where are you moving to?" required>
        </div>
		
		<div class="chat-group">
			<label>Contact Number</label>
			<input type="tel" name="contact_number" placeholder="e.g. 09123456789" required>
		</div>

		<div class="chat-group">
			<label>Facebook / Messenger </label>
			<input type="text" name="facebook" placeholder="Enter your FB name or profile link">
		</div>

        <input type="hidden" name="form_type" value="transfer">

        <button type="button" class="btn" onclick="submitForm()">
            Submit Request
        </button>

    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
    document.body.classList.add("fade-in");
});

document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e){

        const href = this.getAttribute("href");

        if(href.startsWith("#") || href.startsWith("http") || this.target === "_blank"){
            return;
        }

        e.preventDefault();

        document.body.classList.remove("fade-in");
        document.body.classList.add("fade-out");

        setTimeout(() => {
            window.location.href = href;
        }, 400);
    });
});

function submitForm() {
    const form = document.getElementById("relocation_form");
    const formData = new FormData(form);

    fetch("https://script.google.com/macros/s/AKfycbxOsSizJftoKmhyZQKu12w3XxF_3DB8PwcLgxG10H_nHftsXrr0Yity_Kkt40kgILHLmQ/exec", {
        method: "POST",
        body: formData
    })
    .then(() => {
        alert("✅ Request submitted successfully!");
        form.reset();
    })
    .catch(() => {
        alert("❌ Submission failed.");
    });
}

</script>

</body>
</html>
