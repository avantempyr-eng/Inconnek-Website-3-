<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan Upgrade & Downgrade | Inconnek</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:white;
    color:#333;
}

/* NAV */
nav{
    background:#203a43;
    padding:15px 60px;
}

nav a{
    color:#1e88e5;
    text-decoration:none;
    font-weight:600;
}

/* HERO */
.hero{
    padding:120px 60px 60px;
    background:linear-gradient(135deg,#1e88e5,#00c853);
    color:white;
}

.hero h1{
    font-size:48px;
    font-weight:700;
}

.hero p{
    margin-top:15px;
    max-width:600px;
}

/* PRICE BOX */
.price-box{
    margin-top:30px;
    background:white;
    color:#333;
    padding:20px 30px;
    border-radius:15px;
    display:inline-block;
    font-weight:600;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* SECTION */
.section{
    padding:80px 60px;
}

/* CHAT CONTAINER */
.chat-container{
    max-width:650px;
    margin:auto;
    background:white;
    border-radius:25px;
    padding:40px;
    box-shadow:0 25px 60px rgba(0,0,0,0.12);
    border:1px solid rgba(0,0,0,0.05);
}

/* HEADER */
.chat-header{
    font-size:20px;
    font-weight:600;
    color:#1e88e5;
    margin-bottom:25px;
}

.chat-header span{
    display:block;
    font-size:14px;
    font-weight:400;
    color:#666;
    margin-top:5px;
}

/* GROUP */
.chat-group{
    margin-bottom:20px;
}

/* LABEL */
.chat-group label{
    display:block;
    font-size:13px;
    color:#555;
    margin-bottom:8px;
}

/* INPUT */
.chat-group input,
.chat-group select{
    width:100%;
    padding:16px 18px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:15px;
    transition:0.25s ease;
    background:#f9fafb;
}

/* FOCUS EFFECT */
.chat-group input:focus,
.chat-group select:focus{
    outline:none;
    border-color:#1e88e5;
    background:white;
    box-shadow:0 0 0 3px rgba(30,136,229,0.15);
}

/* BUTTON */
.btn{
    margin-top:10px;
    width:100%;
    padding:16px;
    border:none;
    border-radius:50px;
    background:linear-gradient(to right,#1e88e5,#00c853);
    color:white;
    font-weight:600;
    font-size:15px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.04);
}

body{
    opacity:0;
    transform:translateY(20px);
    transition: all 0.5s ease;
}

body.fade-in{
    opacity:1;
    transform:translateY(0);
}

body.fade-out{
    opacity:0;
    transform:translateY(-20px);
}

@media (max-width: 768px){

    nav{
        padding:15px 20px;
    }

    .hero{
        padding:100px 20px 40px;
        text-align:center;
    }

    .hero h1{
        font-size:32px;
    }

    .hero p{
        font-size:14px;
    }

    .price-box{
        display:block;
        margin:20px auto 0;
        text-align:center;
    }

    .section{
        padding:50px 20px;
    }

    .chat-container{
        padding:25px 20px;
    }

    .chat-group input,
    .chat-group select{
        padding:14px;
        font-size:14px;
    }

    .btn{
        padding:14px;
        font-size:14px;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <a href="Inconnek.html">⬅ Back to Home</a>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>Plan Upgrade & Downgrade</h1>
    <p>
        Need more speed or want to reduce your monthly cost? 
        Easily upgrade or downgrade your internet plan based on your needs.
    </p>

    <div class="price-box">
        Processing Time: 24–48 Hours
    </div>
</div>

<div class="chat-container">

    <div class="chat-header">
        Request Plan Change
        <span>Provide your details so we can contact you and process your request.</span>
    </div>

    <form id="upgrade_downgrade_form onsubmit="return false;">
	
        <div class="chat-group">
            <label>Full Name</label>
            <input type="text" name="full_name" placeholder="Enter your full name" required>
        </div>
		
		<div class="chat-group">
			<label>Contact Number</label>
			<input type="tel" name="contact_number" placeholder="e.g. 09123456789" required>
		</div>

		<div class="chat-group">
			<label>Facebook / Messenger </label>
			<input type="text" name="facebook" placeholder="Enter your FB name or profile link">
		</div>

        <div class="chat-group">
            <label>Current Plan</label>
            <input type="text" name="current_plan" placeholder="Enter your current plan" required>
        </div>

        <div class="chat-group">
            <label>Requested Action</label>
            <select name="action" required>
                <option value="">Select option</option>
                <option value="Upgrade">Upgrade</option>
                <option value="Downgrade">Downgrade</option>
            </select>
        </div>

        <div class="chat-group">
            <label>Desired Plan</label>
            <input type="text" name="desired_plan" placeholder="Enter desired plan (Plan 1000)" required>
        </div>

        <input type="hidden" name="form_type" value="plan_change">

        <button type="button" class="btn" onclick="submitForm()">
            Submit Request
        </button>

    </form>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
    document.body.classList.add("fade-in");
});

document.querySelectorAll("a").forEach(link => {
    link.addEventListener("click", function(e){

        const href = this.getAttribute("href");

        if(href.startsWith("#") || href.startsWith("http") || this.target === "_blank"){
            return;
        }

        e.preventDefault();

        document.body.classList.remove("fade-in");
        document.body.classList.add("fade-out");

        setTimeout(() => {
            window.location.href = href;
        }, 400);
    });
});

function submitForm() {
    const form = document.getElementById("upgrade_downgrade_form");
    const formData = new FormData(form);

    // SHOW SUCCESS IMMEDIATELY
    document.querySelector(".chat-container").innerHTML = `
        <div style="text-align:center;">
            <h2>✅ Request Submitted!</h2>
            <p>We’ll contact you shortly.</p>
            <button onclick="resetForm()" class="btn">🔁 Submit Another Request</button>
        </div>
    `;

    // SEND DATA TO APPS SCRIPT
    fetch("https://script.google.com/macros/s/AKfycbzUg3_19iuB0cpI-WQ9IP8Py1-ayP7gDezV4VVm3yE3i4aALow5acYUy9LusmVIGqinlw/exec", {
        method: "POST",
        body: formData,
        mode: "no-cors"
    });
}

function resetForm(){
    window.location.reload();
}
</script>

</body>
</html>
